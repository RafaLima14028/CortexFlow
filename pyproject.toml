[project]
name = "CortexFlow"
version = "0.0.1"
description = "An asynchronous RAG (Retrieval-Augmented Generation) backend built with FastAPI, MongoDB Atlas Vector Search, and Agno agents, featuring secure user isolation, customizable document chunking, and real-time WebSocket streaming."
readme = "README.md"
requires-python = ">=3.12"

