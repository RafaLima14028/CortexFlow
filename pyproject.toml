[project.scripts]
cortex = "src.main:main"

[tool.uv]
python-preference = "system"
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "black>=26.5.1",
    "ruff>=0.15.14",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.ruff]
line-length = 88
target-version = "py313"
exclude = [
    ".git",
    "venv",
    ".venv",
    "__pycache__",
    "build",
    "dist",
    ".vscode",
]
indent-width = 4

[tool.ruff.lint]
select = ["E", "F", "I", "ASYNC", "TID"]
ignore = ["E501", "S101"]
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.black]
line-length = 88
target-version = ["py313"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \venv
  | \.venv
  | build
  | dist
  | __pycache__
  | \.vscode
)/
'''
